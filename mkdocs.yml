site_name: PADO Hologram
site_description: PADO Hologram documentation
site_url: https://cinescope-wkr.github.io/pado-hologram/
repo_url: https://github.com/cinescope-wkr/pado-hologram
repo_name: cinescope-wkr/pado-hologram
edit_uri: edit/main/docs_mkdocs/
theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: blue grey
      accent: cyan
docs_dir: docs_mkdocs
site_dir: site
plugins:
  - search
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
extra_css:
  - assets/stylesheets/extra.css
nav:
  - Home: index.md
  - Guide:
      - Installation: guide/installation.md
      - Quickstart: guide/quickstart.md
      - Repository Layout: guide/repository-layout.md
  - Concepts:
      - Architecture Overview: concepts/architecture.md
      - Core vs Hologram: concepts/core-vs-hologram.md
  - Workflows:
      - Phase-Only CGH: workflows/phase-only-cgh.md
      - Device Modeling: workflows/device-modeling.md
      - Experiments and Hydra: workflows/experiments.md
  - Reference:
      - Module Reference Map: reference/modules.md
      - Fork and License: reference/fork-and-license.md
  - Community:
      - Vision: community/vision.md
      - Contributing: community/contributing.md
